<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minus — Classement Fléchettes</title>
    <meta name="theme-color" content="#1d8f7a" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#151821" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="assets/icon-192.svg" />
    <link rel="apple-touch-icon" href="assets/icon-192.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="brand">
          <div class="brand-mark">–</div>
          <div>
            <h1>Minus <span style="font-size:0.5em;font-weight:400;opacity:0.5;">v1.4</span></h1>
            <p>Classement de parties de fléchettes</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn ghost" data-action="toggle-theme" id="theme-toggle">Mode sombre</button>
        </div>
      </header>

      <nav class="app-nav" id="app-nav">
        <button class="nav-btn" data-action="nav" data-view="match">🎯 Jouer</button>
        <button class="nav-btn" data-action="nav" data-view="stats">📊 Classement</button>
        <button class="nav-btn" data-action="nav" data-view="history">📋 Historique</button>
        <button class="nav-btn" data-action="nav" data-view="settings">⚙️ Réglages</button>
      </nav>

      <main>
        <section id="view-home" class="view"></section>
        <section id="view-players" class="view"></section>
        <section id="view-match" class="view"></section>
        <section id="view-board" class="view"></section>
        <section id="view-stats" class="view"></section>
        <section id="view-history" class="view"></section>
        <section id="view-profile" class="view"></section>
        <section id="view-settings" class="view"></section>
      </main>

      <footer class="app-footer">
        <span>Projet perso — sauvegarde locale</span>
        <span id="footer-meta"></span>
      </footer>
    </div>

    <div id="toast" class="toast"></div>

    <div id="flash-overlay" class="flash-overlay hidden" data-action="dismiss-overlay">
      <div class="flash-content">
        <div class="flash-icon" id="flash-icon"></div>
        <div class="flash-title" id="flash-title"></div>
        <div class="flash-subtitle" id="flash-subtitle"></div>
      </div>
    </div>

    <!-- Onboarding overlay -->
    <div id="onboarding-overlay" class="onboarding-overlay hidden"></div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
